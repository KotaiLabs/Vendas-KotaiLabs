<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KotaiLabs - Compra de Tokens</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --deep-bg: #020b14;
            --panel-bg: rgba(6, 22, 40, 0.94);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--deep-bg);
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            font-family: 'Rajdhani', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container { 
            width: 100%; 
            max-width: 460px;
            padding: 20px; 
        }

        .calculator-card {
            background: var(--panel-bg);
            border: 1px solid var(--neon-blue);
            border-radius: 12px;
            padding: 30px 24px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.15);
            text-align: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-blue);
            font-size: 2.2rem;
            margin-bottom: 6px;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .subtitle { 
            color: #a0c4ff; 
            font-size: 1.1rem; 
            margin-bottom: 28px; 
        }

        .input-group { margin-bottom: 20px; text-align: left; }

        label {
            display: block;
            color: var(--neon-blue);
            margin-bottom: 8px;
            font-size: 0.95rem;
            font-family: 'Orbitron', sans-serif;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(0, 243, 255, 0.45);
            color: white;
            padding: 14px;
            font-size: 1.35rem;
            border-radius: 6px;
            outline: none;
            transition: 0.25s;
        }

        input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 14px rgba(0, 243, 255, 0.35);
        }

        /* Estilo para campo readonly */
        input[readonly] {
            background: rgba(0, 0, 0, 0.85);
            border-color: rgba(0, 243, 255, 0.25);
            color: #00f3ff;
            cursor: not-allowed;
            opacity: 0.95;
        }

        .currency-symbol { position: relative; }

        .currency-symbol::before {
            content: attr(data-symbol);
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0c4ff;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .currency-symbol input { padding-left: 45px; }

        .buy-btn {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            background: rgba(0, 243, 255, 0.1);
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-shadow: 0 0 5px var(--neon-blue);
        }

        .buy-btn:hover {
            background: var(--neon-blue);
            color: var(--deep-bg);
            box-shadow: 0 0 20px var(--neon-blue);
            transform: translateY(-2px);
        }

        /* ESTILO DO MODAL */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--panel-bg);
            border: 2px solid var(--neon-blue);
            padding: 30px;
            border-radius: 15px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 30px var(--neon-blue);
        }

        .modal-title {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-blue);
            margin-bottom: 20px;
            font-size: 1.4rem;
        }

        .method-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .method-card {
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid rgba(0, 243, 255, 0.4);
            padding: 20px 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .method-card:hover {
            background: rgba(0, 243, 255, 0.25);
            border-color: var(--neon-blue);
            transform: scale(1.05);
        }

        .method-card img { width: 40px; margin-bottom: 10px; }
        .method-name { font-weight: bold; color: white; }

        .close-modal {
            margin-top: 20px;
            display: inline-block;
            color: #aaa;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: underline;
        }

        .footer-info { margin-top: 24px; border-top: 1px solid rgba(0, 243, 255, 0.18); padding-top: 16px; }
        .loading-text { font-size: 0.88rem; color: #aaa; margin: 8px 0 2px; }
        .source-info { font-size: 0.70rem; color: #555; opacity: 0.75; margin-bottom: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="calculator-card">
        <h1>KotaiLabs</h1>
        <p class="subtitle">Portal de Vendas de Tokens</p>

        <div class="input-group">
            <label>PREÇO DO TOKEN (USD)</label>
            <div class="currency-symbol" data-symbol="$">
                <input type="number" id="tokenPrice" value="0.0003" step="0.0001" readonly>
            </div>
        </div>

        <div class="input-group">
            <label>QUANTIDADE DE TOKENS</label>
            <input type="text" id="tokenAmount" placeholder="Ex: 10.000.000" inputmode="numeric">
        </div>

        <div class="input-group">
            <label>OU VALOR EM DÓLAR (USD)</label>
            <div class="currency-symbol" data-symbol="$">
                <input type="number" id="payUSD" placeholder="0.00" step="0.01">
            </div>
        </div>

        <div class="input-group">
            <label>OU VALOR EM REAIS (PIX/BRL)</label>
            <div class="currency-symbol" data-symbol="R$">
                <input type="number" id="payBRL" placeholder="0.00" step="0.01">
            </div>
        </div>

        <button class="buy-btn" onclick="openModal()">COMPRAR AGORA</button>

        <div class="footer-info">
            <p class="loading-text" id="statusMsg">Carregando cotação...</p>
            <div class="source-info" id="sourceInfo"></div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="paymentModal">
    <div class="modal-content">
        <h2 class="modal-title">COMO DESEJA PAGAR?</h2>
        <div class="method-grid">
            <div class="method-card" onclick="processPurchase('USDT')">
                <div style="font-size: 2rem;">💵</div>
                <div class="method-name">Dólar (USDT)</div>
            </div>
            <div class="method-card" onclick="processPurchase('Pix')">
                <div style="font-size: 2rem;">💎</div>
                <div class="method-name">Pix (BRL)</div>
            </div>
        </div>
        <span class="close-modal" onclick="closeModal()">Cancelar</span>
    </div>
</div>

<script>
    let dollarRate = 5.80;
    let lastEdited = 'amount';
    
    const priceInput = document.getElementById('tokenPrice');
    const amountInput = document.getElementById('tokenAmount');
    const payUsdInput = document.getElementById('payUSD');
    const payBrlInput = document.getElementById('payBRL');
    const statusMsg = document.getElementById('statusMsg');

    function formatTokens(val) {
        return new Intl.NumberFormat('pt-BR').format(Math.floor(val));
    }

    // --- LÓGICA DE CÁLCULO ---
    amountInput.addEventListener('input', function(e) {
        lastEdited = 'amount';
        let raw = e.target.value.replace(/\D/g, "");
        if (raw === "") { resetFields(); return; }
        e.target.value = formatTokens(raw);
        let amount = parseFloat(raw);
        let usd = amount * parseFloat(priceInput.value);
        payUsdInput.value = usd.toFixed(2);
        payBrlInput.value = (usd * dollarRate).toFixed(2);
    });

    payUsdInput.addEventListener('input', function(e) {
        lastEdited = 'usd';
        let usd = parseFloat(e.target.value);
        if (isNaN(usd)) { resetFields(); return; }
        payBrlInput.value = (usd * dollarRate).toFixed(2);
        amountInput.value = formatTokens(usd / parseFloat(priceInput.value));
    });

    payBrlInput.addEventListener('input', function(e) {
        lastEdited = 'brl';
        let brl = parseFloat(e.target.value);
        if (isNaN(brl)) { resetFields(); return; }
        let usd = brl / dollarRate;
        payUsdInput.value = usd.toFixed(2);
        amountInput.value = formatTokens(usd / parseFloat(priceInput.value));
    });

    function resetFields() {
        amountInput.value = ""; payUsdInput.value = ""; payBrlInput.value = "";
    }

    // --- LÓGICA DO MODAL E COMPRA ---
    function openModal() {
        if (!amountInput.value) { alert("Por favor, insira uma quantidade ou valor."); return; }
        document.getElementById('paymentModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('paymentModal').style.display = 'none';
    }

    function processPurchase(metodo) {
        const qtd = amountInput.value;
        const valorFinal = (metodo === 'Pix') ? `R$ \( {payBrlInput.value}` : ` \) ${payUsdInput.value}`;
        
        const mensagem = `Olá, quero adquirir o token KTI com desconto.%0A%0A` +
                         `*Detalhes do Pedido:*%0A` +
                         `- Quantidade: ${qtd} KTI%0A` +
                         `- Método: ${metodo}%0A` +
                         `- Valor a pagar: ${valorFinal}`;
        
        const telegramLink = `https://t.me/KotaiLabs?text=${mensagem}`;
        
        window.open(telegramLink, '_blank');
        closeModal();
    }

    // --- COTAÇÃO ---
    async function loadDollarRate() {
        try {
            const res = await fetch('https://economia.awesomeapi.com.br/json/last/USD-BRL');
            const data = await res.json();
            dollarRate = parseFloat(data.USDBRL.bid);
            statusMsg.innerText = `Cotação atualizada: 1 USD = R$ ${dollarRate.toFixed(2)}`;
        } catch {
            statusMsg.innerText = `Usando cotação fixa: R$ ${dollarRate.toFixed(2)}`;
        }
    }

    window.onload = loadDollarRate;
</script>

</body>
</html>
